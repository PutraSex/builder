name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "Link download ZIP project Flutter"
        required: true
      tag:
        description: "Tag release sumber ZIP"
        required: true
      build_type:
        description: "debug atau release"
        required: true
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download project ZIP
        run: |
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
          mkdir -p project
          unzip -q project.zip -d project

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: project
        run: flutter pub get

      - name: Build APK (${{ github.event.inputs.build_type }})
        working-directory: project
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Collect APK
        run: |
          mkdir -p output
          find project/build/app/outputs -name "*.apk" -exec cp {} output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-result-${{ github.event.inputs.tag }}
          path: output/*.apk
          retention-days: 1
