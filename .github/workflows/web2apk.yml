name: Web to APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "URL website yang akan dijadikan APK"
        required: true
      app_name:
        description: "Nama aplikasi"
        required: true
      icon_url:
        description: "Link download icon.png"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout template Webview APK
        uses: actions/checkout@v4
        with:
          # Ganti dengan repo template WebView Flutter/Android kamu sendiri
          repository: ${{ github.repository }}
          ref: main

      - name: Download icon
        run: curl -L "${{ github.event.inputs.icon_url }}" -o assets/icon.png

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Inject konfigurasi Web2APK
        run: |
          echo "WEB_URL=${{ github.event.inputs.web_url }}" >> .env
          echo "APP_NAME=${{ github.event.inputs.app_name }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Collect APK
        run: |
          mkdir -p output
          find build/app/outputs -name "*.apk" -exec cp {} output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-result-web2apk-${{ github.run_id }}
          path: output/*.apk
          retention-days: 1
